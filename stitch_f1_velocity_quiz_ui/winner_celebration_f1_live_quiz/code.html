<canvas id="shader-canvas-ANIMATION_1" style="display:block;width:100%;height:100%"></canvas>
<script>
(function() {
  const canvas = document.getElementById('shader-canvas-ANIMATION_1');

  // Sync the WebGL drawing-buffer size with the CSS-driven layout size.
  // This fires on initial layout and whenever the element is resized.
  function syncSize() {
    const w = canvas.clientWidth  || 1280;
    const h = canvas.clientHeight || 720;
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width  = w;
      canvas.height = h;
    }
  }
  if (typeof ResizeObserver !== 'undefined') {
    new ResizeObserver(syncSize).observe(canvas);
  }
  syncSize();

  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) return;
  const vs = `attribute vec2 a_position;
varying vec2 v_texCoord;
void main() {
  v_texCoord = a_position * 0.5 + 0.5;
  gl_Position = vec4(a_position, 0.0, 1.0);
}`;
  const fs = `precision highp float;
varying vec2 v_texCoord;
uniform float u_time;
uniform vec2 u_resolution;

float random(vec2 st) {
    return fract(sin(dot(st.xy, vec2(12.9898,78.233))) * 43758.5453123);
}

void main() {
    vec2 uv = v_texCoord;
    vec3 color = vec3(0.043, 0.043, 0.043); // Deep carbon background
    
    // Animated racing streaks
    float speed = 2.0;
    float time = u_time * speed;
    
    for(float i = 0.0; i < 8.0; i++) {
        float row = floor(uv.y * 20.0 + i);
        float offset = random(vec2(row, 1.0)) * 10.0;
        float streak = step(0.98, fract(uv.x - time * (0.5 + random(vec2(row)) * 0.5) + offset));
        
        // F1 Red glow
        vec3 streakColor = vec3(0.882, 0.024, 0.0);
        color = mix(color, streakColor, streak * 0.3 * (1.0 - uv.x));
    }

    // Subtle vignette
    float vignette = 1.0 - length(uv - 0.5) * 0.5;
    color *= vignette;

    gl_FragColor = vec4(color, 1.0);
}`;
  function cs(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    return s;
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, cs(gl.VERTEX_SHADER, vs));
  gl.attachShader(prog, cs(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(prog);
  gl.useProgram(prog);
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const pos = gl.getAttribLocation(prog, 'a_position');
  gl.enableVertexAttribArray(pos);
  gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);
  const uTime = gl.getUniformLocation(prog, 'u_time');
  const uRes = gl.getUniformLocation(prog, 'u_resolution');
  const uMouse = gl.getUniformLocation(prog, 'u_mouse');

  // u_mouse is in pixel coordinates matching u_resolution (ShaderToy convention).
  // Shaders that need normalized coords should use: u_mouse / u_resolution.
  let mouse = { x: canvas.width / 2, y: canvas.height / 2 };
  window.addEventListener('mousemove', (event) => {
    const rect = canvas.getBoundingClientRect();
    if (rect.width && rect.height) {
      const nx = (event.clientX - rect.left) / rect.width;
      const ny = 1.0 - (event.clientY - rect.top) / rect.height;
      mouse.x = nx * canvas.width;
      mouse.y = ny * canvas.height;
    }
  });

  function render(t) {
    if (typeof ResizeObserver === 'undefined') syncSize();
    gl.viewport(0, 0, canvas.width, canvas.height);
    if (uTime) gl.uniform1f(uTime, t * 0.001);
    if (uRes) gl.uniform2f(uRes, canvas.width, canvas.height);
    if (uMouse) gl.uniform2f(uMouse, mouse.x, mouse.y);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(render);
  }
  render(0);
})();
</script>

<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_2');
  const devicePixelRatio = window.devicePixelRatio || 1;
  const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });

renderer.setSize(width, height);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

// Create a Trophy-like 3D geometry using primitives
const trophyGroup = new THREE.Group();

// Base
const baseGeo = new THREE.CylinderGeometry(0.5, 0.6, 0.2, 32);
const baseMat = new THREE.MeshPhongMaterial({ color: 0xFFD700, shininess: 100 });
const base = new THREE.Mesh(baseGeo, baseMat);
trophyGroup.add(base);

// Stem
const stemGeo = new THREE.CylinderGeometry(0.1, 0.1, 1, 32);
const stem = new THREE.Mesh(stemGeo, baseMat);
stem.position.y = 0.6;
trophyGroup.add(stem);

// Cup
const cupGeo = new THREE.CylinderGeometry(0.6, 0.2, 0.8, 32, 1, true);
const cup = new THREE.Mesh(cupGeo, baseMat);
cup.position.y = 1.4;
trophyGroup.add(cup);

// Handles
const handleGeo = new THREE.TorusGeometry(0.3, 0.05, 16, 32, Math.PI);
const handleL = new THREE.Mesh(handleGeo, baseMat);
handleL.position.set(-0.5, 1.5, 0);
handleL.rotation.z = Math.PI / 2;
trophyGroup.add(handleL);

const handleR = new THREE.Mesh(handleGeo, baseMat);
handleR.position.set(0.5, 1.5, 0);
handleR.rotation.z = -Math.PI / 2;
trophyGroup.add(handleR);

scene.add(trophyGroup);

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);
const pointLight = new THREE.PointLight(0xffffff, 1);
pointLight.position.set(5, 5, 5);
scene.add(pointLight);

camera.position.z = 5;

function animate() {
    requestAnimationFrame(animate);
    trophyGroup.rotation.y += 0.01;
    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
});

animate();
})();
</script>

<script>
        // Confetti Creation
        function createConfetti() {
            const container = document.getElementById('confetti-container');
            const colors = ['#E10600', '#FFB4A8', '#00DBE9', '#FFFFFF', '#C6C6CA'];
            
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
                confetti.style.animationDelay = (Math.random() * 5) + 's';
                confetti.style.opacity = Math.random();
                container.appendChild(confetti);
            }
        }

        // Prize Wheel Implementation
        const wheelInner = document.getElementById('wheel-inner');
        const wheelContainer = document.getElementById('wheel-container');
        const spinBtn = document.getElementById('spin-button');
        
        const prizes = [
            { label: '10 BONUS PTS', color: '#1F2124', icon: 'star' },
            { label: 'MYSTERY PRIZE', color: '#E10600', icon: 'card_giftcard' },
            { label: 'JACKPOT', color: '#00DBE9', icon: 'military_tech' },
            { label: 'DOUBLE XP', color: '#1F2124', icon: 'bolt' },
            { label: 'FREE ENTRY', color: '#E10600', icon: 'confirmation_number' },
            { label: 'TRY AGAIN', color: '#1F2124', icon: 'refresh' },
            { label: 'VIP PASS', color: '#00DBE9', icon: 'workspace_premium' },
            { label: '5 BONUS PTS', color: '#1F2124', icon: 'add' }
        ];

        function initWheel() {
            const angle = 360 / prizes.length;
            prizes.forEach((prize, i) => {
                const segment = document.createElement('div');
                segment.className = 'absolute inset-0 w-full h-full flex flex-col items-center pt-8';
                segment.style.transform = `rotate(${i * angle}deg)`;
                segment.style.clipPath = `polygon(50% 50%, ${50 - 50 * Math.tan(Math.PI/prizes.length)}% 0%, ${50 + 50 * Math.tan(Math.PI/prizes.length)}% 0%)`;
                segment.style.backgroundColor = prize.color;
                
                segment.innerHTML = `
                    <div class="flex flex-col items-center gap-2" style="transform: rotate(0deg)">
                        <span class="material-symbols-outlined text-white text-2xl">${prize.icon}</span>
                        <span class="font-label-sm text-[8px] text-white/80 whitespace-nowrap">${prize.label}</span>
                    </div>
                `;
                wheelInner.appendChild(segment);
            });
        }

        let currentRotation = 0;
        let isSpinning = false;

        spinBtn.addEventListener('click', () => {
            if (isSpinning) return;
            
            isSpinning = true;
            const extraSpins = 5 + Math.random() * 5;
            const randomAngle = Math.floor(Math.random() * 360);
            currentRotation += (extraSpins * 360) + randomAngle;
            
            wheelContainer.style.transform = `rotate(${currentRotation}deg)`;
            
            setTimeout(() => {
                isSpinning = false;
                // Celebration burst on stop
                createConfetti();
            }, 4000);
        });

        // Initialize
        createConfetti();
        initWheel();
    </script>
<div class="scanlines fixed inset-0 z-50"></div>
</body></html>
