<style>
        @font-face {
            font-family: 'Geist Mono';
            src: url('https://cdn.jsdelivr.net/npm/geist-font@1.1.0/fonts/geist-mono/GeistMono-Bold.woff2') format('woff2');
        }
        .font-mono-data { font-family: 'Geist Mono', monospace; }
        
        body {
            background-color: #0B0B0B;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(225, 6, 0, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(225, 6, 0, 0.05) 0%, transparent 40%),
                url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0h20v20H0V0zm20 20h20v20H20V20z' fill='%23ffffff' fill-opacity='0.02' fill-rule='evenodd'/%3E%3C/svg%3E");
            color: #e5e2e1;
            overflow-x: hidden;
        }

        .glass-panel {
            background: rgba(31, 33, 36, 0.6);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            border-right: 1px solid rgba(255, 255, 255, 0.2);
        }

        .neon-glow-red {
            box-shadow: 0 0 15px rgba(225, 6, 0, 0.3);
        }

        .timer-svg {
            transform: rotate(-90deg);
        }

        .timer-path {
            stroke-dasharray: 283;
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 1s linear, stroke 0.3s ease;
        }

        @keyframes pulse-red {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 5px rgba(225, 6, 0, 0.8)); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 15px rgba(225, 6, 0, 1)); }
        }

        .pulse-critical {
            animation: pulse-red 0.5s infinite;
        }

        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(225, 6, 0, 0.1);
            position: absolute;
            animation: scan 4s linear infinite;
            pointer-events: none;
            z-index: 10;
        }

        @keyframes scan {
            from { top: 0; }
            to { top: 100%; }
        }

        .answer-card:hover {
            transform: translateY(-2px) scale(1.01);
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(225, 6, 0, 0.5);
            box-shadow: 0 0 20px rgba(225, 6, 0, 0.2);
        }

        .answer-card.selected {
            border-color: #ffb4a8;
            background: rgba(255, 180, 168, 0.1);
        }

        .answer-card.correct {
            border-color: #00dbe9;
            background: rgba(0, 219, 233, 0.1);
            box-shadow: 0 0 20px rgba(0, 219, 233, 0.3);
        }

        .answer-card.wrong {
            border-color: #e10600;
            background: rgba(225, 6, 0, 0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<main class="pt-24 pb-32 px-margin-mobile max-w-container-max mx-auto min-h-screen flex flex-col">

<circle class="timer-path stroke-tertiary" cx="50" cy="50" fill="none" id="timer-progress" r="45" stroke-linecap="round" stroke-width="6"></circle>

<script>
        const timerProgress = document.getElementById('timer-progress');
        const timerText = document.getElementById('timer-text');
        const totalTime = 30;
        let timeLeft = totalTime;

        const updateTimer = () => {
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                return;
            }

            timeLeft--;
            timerText.innerText = timeLeft;

            const offset = 283 - (timeLeft / totalTime) * 283;
            timerProgress.style.strokeDashoffset = offset;

            if (timeLeft <= 10) {
                timerProgress.classList.remove('stroke-tertiary');
                timerProgress.classList.add('stroke-primary');
                timerText.classList.add('text-primary');
            }

            if (timeLeft <= 5) {
                timerText.parentElement.classList.add('pulse-critical');
            }
        };

        const timerInterval = setInterval(updateTimer, 1000);

        const cards = document.querySelectorAll('.answer-card');
        cards.forEach(card => {
            card.addEventListener('click', () => {
                cards.forEach(c => c.classList.remove('selected', 'correct', 'wrong'));
                card.classList.add('selected');
                
                // Simulate feedback
                setTimeout(() => {
                    const isCorrect = card.innerText.includes('Max Verstappen');
                    if (isCorrect) {
                        card.classList.remove('selected');
                        card.classList.add('correct');
                        // Micro-interaction score increase
                    } else {
                        card.classList.remove('selected');
                        card.classList.add('wrong');
                        // Find and show correct one
                        cards.forEach(c => {
                            if (c.innerText.includes('Max Verstappen')) {
                                c.classList.add('correct');
                            }
                        });
                    }
                }, 800);
            });
        });

        // Initialize progress bar width
        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('progress-bar').style.width = '26.6%';
        });
    </script>
